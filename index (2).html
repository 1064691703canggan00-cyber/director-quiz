<script>
var D={
kubrick:{name:"斯坦利·库布里克",en:"Stanley Kubrick",emoji:"🎯",col:"#1a1a2e",ac:"#e94560",

  kw:["控制狂","冷血美学","细节偏执","宇宙级孤独"],wk:"《2001太空漫游》《发条橙》《闪灵》"},
miyazaki:{name:"宫崎骏",en:"Hayao Miyazaki",emoji:"🌿",col:"#1b4332",ac:"#74c69d",

  kw:["暴躁慈悲","万物有灵","手作执念","赤子之心"],wk:"《千与千寻》《龙猫》《天空之城》"},
tarantino:{name:"昆汀·塔伦蒂诺",en:"Quentin Tarantino",emoji:"💥",col:"#3d0000",ac:"#ff6b35",
  tr:{perfectionism:30,emotion:40,rebellion:98,philosophy:15,visual:55,narrative:90,humor:95,humanity:35},
  desc:"你是一个把「话痨」修炼成行为艺术的叛逆天才。你最大的魅力是那种把全世界的烂片冷知识变成迷人谈资的本事——跟你吃饭永远不会无聊，但可能会被服务员投来异样的目光。虽然你有时候会沉迷于自己的世界到忘记别人的存在，但你内心里其实是一个渴望找到「同频率怪人」的孤独收藏家。只有那些凌晨三点还能跟你争论「B级片到底算不算艺术」的人，才会懂你为什么笑着笑着眼睛会突然亮起来。你的歌单一定乱七八糟但每首都有故事。",
  kw:["话痨之王","垃圾文化教授","暴力诗人","人形点唱机"],wk:"《低俗小说》《杀死比尔》《无耻混蛋》"},
wonkar:{name:"王家卫",en:"Wong Kar-wai",emoji:"🌃",col:"#0d1b2a",ac:"#00b4d8",
  tr:{perfectionism:75,emotion:98,rebellion:45,philosophy:70,visual:98,narrative:40,humor:10,humanity:60},
  desc:"你是一个活在自己情绪里的时间旅行者。你最大的魅力是那种让人说不清道不明的氛围感——你往那儿一站，背景自动变成霓虹灯下的雨夜。虽然你有时候会矫情到连自己都受不了自己，但你内心里其实是一个被「错过」这件事反复击穿的人。只有那些懂得在凌晨两点不问「你在干嘛」而是发一首老歌给你的人，才会懂你墨镜背后那双看什么都像在告别的眼睛。你一定保留着某个人很久以前发的消息，偶尔会翻出来看看。",
  kw:["氛围感怪物","时间囚徒","已读不回大师","墨镜哲学家"],wk:"《花样年华》《重庆森林》《春光乍泄》"},
nolan:{name:"克里斯托弗·诺兰",en:"Christopher Nolan",emoji:"⏰",col:"#14213d",ac:"#fca311",
  tr:{perfectionism:90,emotion:45,rebellion:35,philosophy:85,visual:80,narrative:98,humor:10,humanity:50},
  desc:"你是一个用Excel表格写情书的叙事建筑师。你最大的魅力是那种把所有人都绕晕了、然后优雅地揭开谜底时的得意——你天生就是那种考试交卷最晚但分最高的人。虽然你有时候会因为太沉迷于「结构」而忘记了「感受」，但你内心里其实是一个害怕时间流逝、想要抓住一切的人。只有那些不会在你说「其实这里有一个隐藏的对称结构」时翻白眼的人，才会懂你反复拆解世界的背后，是一种笨拙的深情。你大概率有画思维导图的习惯。",
  kw:["人形解谜机","时间恐惧症","烧脑成瘾","理科生浪漫"],wk:"《盗梦空间》《星际穿越》《信条》"},
fellini:{name:"费德里科·费里尼",en:"Federico Fellini",emoji:"🎪",col:"#2d0036",ac:"#e040fb",
  tr:{perfectionism:25,emotion:80,rebellion:70,philosophy:50,visual:85,narrative:35,humor:90,humanity:85},
  desc:"你是一个在菜市场也能看见马戏团的梦游者。你最大的魅力是那种把混乱变成狂欢的天赋——别人的人生是线性的，你的是旋转木马。虽然你有时候会让身边的人搞不清你到底是在开玩笑还是认真的，但你内心里其实是一个深知「荒诞才是真相」的通透之人。只有那些能跟你一起在暴雨中跳舞而不问「为什么」的人，才会懂你小丑妆底下那张认真到发光的脸。你的朋友圈一定很少发，但发出来的每条都让人看不懂又想点赞。",
  kw:["人间马戏团长","荒诞即正义","浪漫流浪汉","清醒梦游者"],wk:"《八部半》《甜蜜的生活》《大路》"},
hitchcock:{name:"阿尔弗雷德·希区柯克",en:"Alfred Hitchcock",emoji:"🔪",col:"#1a1a1a",ac:"#b91c1c",
  tr:{perfectionism:90,emotion:30,rebellion:25,philosophy:40,visual:80,narrative:95,humor:75,humanity:30},

  kw:["优雅变态","悬念上瘾","控场之王","冷笑话刺客"],wk:"《惊魂记》《后窗》《迷魂记》"},
tarkovsky:{name:"安德烈·塔可夫斯基",en:"Andrei Tarkovsky",emoji:"💧",col:"#0a0a0a",ac:"#90a4ae",
  tr:{perfectionism:60,emotion:85,rebellion:55,philosophy:98,visual:95,narrative:20,humor:5,humanity:75},
  desc:"你是一个觉得「快乐」这个词太肤浅的灵魂苦行僧。你最大的魅力是那种让人在你身边自动放慢呼吸的气场——你不说话的时候比大多数人说一万句都更有分量。虽然你有时候会把简单的事情想得过于沉重，但你内心里其实是一个被美击穿过太多次、所以不敢轻易感动的人。只有那些能跟你一起沉默两小时、看完雨滴沿着玻璃滑下来而不觉得无聊的人，才会懂你眼里那种似水的忧伤。你大概率讨厌短视频，觉得那是对时间的亵渎。",
  kw:["沉默即暴力","灵魂潜水员","慢即是快","雨水收藏家"],wk:"《潜行者》《镜子》《乡愁》"},
spielberg:{name:"史蒂文·斯皮尔伯格",en:"Steven Spielberg",emoji:"✨",col:"#1a237e",ac:"#42a5f5",

var qs=[],ci=0,ans=[],busy=false;
function shuffle(a){var b=[].concat(a);for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function $(id){return document.getElementById(id)}
function show(id){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});$(id).classList.add('on');window.scrollTo(0,0)}
function toast(m){var t=$('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2400)}
function start(){qs=shuffle(Q);ci=0;ans=[];busy=false;render();show('s-quiz')}
function render(){
  var q=qs[ci],tot=qs.length,pct=(ci/tot)*100;
  $('qf').style.width=pct+'%';$('qn').textContent=(ci+1)+' / '+tot;
  var txt=$('qt');txt.textContent=q.q;txt.className='qt anim-sm';
  var box=$('qo');box.innerHTML='';box.className='qo anim-sm2';
  var L=['A','B','C','D'];
  q.o.forEach(function(opt,i){
    var b=document.createElement('button');b.className='qx';
    b.innerHTML='<span class="le">'+L[i]+'.</span>'+opt.t;
    b.addEventListener('click',function(e){e.preventDefault();pick(b,opt)});
    box.appendChild(b);
  });
}
function pick(btn,opt){
  if(busy)return;busy=true;
  document.querySelectorAll('.qx').forEach(function(b){b.classList.add('off')});
  btn.classList.remove('off');btn.classList.add('sel');
  ans.push(opt.s);
  setTimeout(function(){if(ci<qs.length-1){ci++;render();busy=false}else{result()}},400);
}
function result(){
  var sc={};Object.keys(D).forEach(function(k){sc[k]=0});
  ans.forEach(function(a){Object.keys(a).forEach(function(k){if(sc[k]!==undefined)sc[k]+=a[k]})});
  var sorted=Object.entries(sc).sort(function(a,b){return b[1]-a[1]});
  var wk=sorted[0][0],dir=D[wk];
  var second=sorted.length>1?D[sorted[1][0]]:dir;
  var topScore=sorted[0][1],secScore=sorted.length>1?sorted[1][1]:0;
  var blend=topScore>0?Math.min(secScore/topScore,0.35):0;
  var traits={};
  Object.keys(TL).forEach(function(t){traits[t]=dir.tr[t]*(1-blend)+second.tr[t]*blend});
  var top3=sorted.slice(0,3),mx=top3[0][1];
  var rs=$('s-result');
  rs.style.background='linear-gradient(175deg,'+dir.col+' 0%,#07060b 45%,'+dir.col+'44 100%)';
  var h='<div class="rh"><p class="rl" style="color:'+dir.ac+'">YOUR DIRECTOR PERSONALITY</p>';
  h+='<div class="re" style="filter:drop-shadow(0 0 24px '+dir.ac+'40)">'+dir.emoji+'</div>';
  h+='<h1 class="rn">'+dir.name+'</h1><p class="rne">'+dir.en+'</p></div>';
  h+='<div class="rk">';dir.kw.forEach(function(k){h+='<span class="rkw" style="color:'+dir.ac+';border-color:'+dir.ac+'40">'+k+'</span>'});h+='</div>';
  h+='<div class="rc"><p class="rdt">'+dir.desc+'</p><p class="rwk">代表作：'+dir.wk+'</p></div>';
  h+='<div class="rr"><p class="rsl">你 的 创 作 人 格 图 谱</p>'+radar(traits,dir.ac)+'</div>';
  h+='<div class="rts">';
  Object.keys(traits).forEach(function(k){var v=traits[k];
    h+='<div class="rt"><div class="rti"><span class="rtn">'+TL[k]+'</span><span class="rtv" style="color:'+dir.ac+'">'+Math.round(v)+'</span></div>';
    h+='<div class="rtk"><div class="rtf" style="width:0;background:linear-gradient(90deg,'+dir.ac+'80,'+dir.ac+')" data-w="'+v+'%"></div></div></div>'});
  h+='</div>';
  h+='<div class="r3s"><p class="rsl">最 匹 配  T O P  3</p>';
  top3.forEach(function(item,i){var dk=item[0],s=item[1],d=D[dk],p=Math.round((s/mx)*100);
    h+='<div class="r3"><span class="r3e">'+d.emoji+'</span><div class="r3r"><div class="r3m"><span class="r3n" style="color:'+(i===0?'#ede4d3':'#9e9282')+';font-weight:'+(i===0?'600':'400')+'">'+d.name+'</span>';
    h+='<span class="r3p">'+p+'%</span></div><div class="r3b"><div class="r3f" style="width:0;background:'+(i===0?dir.ac:'#5c5448')+'" data-w="'+p+'%"></div></div></div></div>'});
  h+='</div>';
  h+='<div class="ra"><button class="rbsh" id="bsh" style="background:'+dir.ac+';color:#07060b">分 享 结 果</button>';
  h+='<button class="rbre" id="bre">重 新 测 试</button></div>';
  h+='<p class="rfo">DIRECTOR PERSONALITY TEST · 导演人格测试</p>';
  $('rw').innerHTML=h;$('rw').className='rw anim-up';show('s-result');
  $('bsh').addEventListener('click',function(e){e.preventDefault();share(dir)});
  $('bre').addEventListener('click',function(e){e.preventDefault();start()});
  requestAnimationFrame(function(){setTimeout(function(){document.querySelectorAll('.rtf,.r3f').forEach(function(el){el.style.width=el.dataset.w})},250)});
}
function share(dir){
  var txt='\u{1F3AC} 我做了「你的灵魂像哪位导演」人格测试，我的结果是——'+dir.name+'（'+dir.en+'）！'+dir.kw.join(' · ')+'。来测测你像哪位导演吧！';
  if(navigator.share){navigator.share({title:'电影导演人格测试',text:txt}).catch(function(){})}
  else if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){toast('✓ 已复制到剪贴板')}).catch(function(){fc(txt)})}
  else{fc(txt)}
}
function fc(txt){var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('✓ 已复制到剪贴板')}catch(e){prompt('复制以下文字分享：',txt)}document.body.removeChild(ta)}
function radar(traits,ac){
  var keys=Object.keys(traits),vals=Object.values(traits),n=keys.length,cx=150,cy=150,r=105;
  function pt(i,v){var a=Math.PI*2*i/n-Math.PI/2;return[cx+r*(v/100)*Math.cos(a),cy+r*(v/100)*Math.sin(a)]}
  var s='<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">';
  [.25,.5,.75,1].forEach(function(l){var d='';for(var i=0;i<n;i++){var p=pt(i,l*100);d+=(i?'L':'M')+p[0]+' '+p[1]+' '}d+='Z';s+='<path d="'+d+'" fill="none" stroke="rgba(237,228,211,.07)" stroke-width="1"/>'});
  for(var i=0;i<n;i++){var p=pt(i,100);s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0]+'" y2="'+p[1]+'" stroke="rgba(237,228,211,.05)" stroke-width="1"/>'}
  var d='',pts=[];vals.forEach(function(v,i){var p=pt(i,v);pts.push(p);d+=(i?'L':'M')+p[0]+' '+p[1]+' '});d+='Z';
  s+='<path d="'+d+'" fill="'+ac+'20" stroke="'+ac+'" stroke-width="2"/>';
  pts.forEach(function(p){s+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3.5" fill="'+ac+'"/>'});
  keys.forEach(function(k,i){var p=pt(i,122);s+='<text x="'+p[0]+'" y="'+p[1]+'" text-anchor="middle" dominant-baseline="central" fill="#9e9282" font-size="10.5" font-family="Noto Serif SC,serif">'+TL[k]+'</text>'});
  return s+'</svg>'}
document.addEventListener('DOMContentLoaded',function(){$('go').addEventListener('click',function(e){e.preventDefault();start()})});
</script>
